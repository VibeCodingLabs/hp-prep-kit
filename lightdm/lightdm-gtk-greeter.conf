# LightDM GTK+ Greeter config for HP Prep Kit
# Install to: /etc/lightdm/lightdm-gtk-greeter.conf.d/50-hp-prep.conf
# Then run: sudo systemctl restart lightdm (ends current session)

[greeter]
# Set a background image for the login screen
# Replace the path with your own image (copy it to /usr/share/backgrounds/ first)
background=/usr/share/backgrounds/hp-prep-greeter.jpg

# Show user list on login screen
hide-user-image=false

# Dark theme + Papirus icons for a polished login screen
theme-name=Greybird-dark
icon-theme-name=Papirus

# Font
font-name=Monospace 11

# Don't inherit individual user wallpapers on the greeter
user-background=false
